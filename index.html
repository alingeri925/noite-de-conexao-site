<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Noite de Conexão</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #fff7ef;
      color: #3a201a;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 24px;
    }

    .card {
      max-width: 720px;
      background: #ffffff;
      border: 1px solid #d8a99b;
      border-radius: 24px;
      padding: 48px 32px;
      box-shadow: 0 20px 60px rgba(74, 20, 34, 0.12);
    }

    h1 {
      color: #4a1422;
      font-size: 44px;
      margin-bottom: 16px;
    }

    p {
      font-size: 20px;
      line-height: 1.5;
      margin-bottom: 28px;
    }

    .button {
      display: inline-block;
      background: #4a1422;
      color: #fff;
      padding: 16px 28px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: bold;
    }

    .small {
      margin-top: 24px;
      font-size: 14px;
      color: #8a5a4a;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Noite de Conexão</h1>
    <p>
      Uma experiência digital para casais transformarem uma noite comum
      em um momento de presença, conversa e carinho.
    </p>

    <a class="button" href="#">
      Comprar agora
    </a>

    <div class="small">
      Página em construção.
    </div>
  </main>
</body>
</html>
